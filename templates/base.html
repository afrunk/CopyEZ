<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <title>{% block title %}CopyEZ{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- 禁用页面缓存，确保总是获取最新内容 -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <!-- 引入免费开源可商用的狂草字体：站酷快乐体（ZCOOL KuaiLe） -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
  </head>
  <body>
    <div class="app-shell">
      {% block app_shell_prefix %}{% endblock %}
      <header class="app-header">
        <div class="app-title">
          <a href="{{ url_for('notes') }}">CopyEZ</a>
        </div>
        {% block header_search %}{% endblock %}
        <nav class="app-nav">
          <a href="{{ url_for('memos_page') }}" class="nav-btn memo-nav-btn">
            ⚡ 随心记
          </a>
          <a href="{{ url_for('my_quotes_page') }}" class="nav-btn memo-nav-btn">
            📂 语录本
          </a>
          <a href="{{ url_for('new_note') }}" class="btn-icon-primary" title="新建素材">
            <span class="icon-plus"></span>
          </a>
          <button id="lock-screen-btn" class="btn-icon-primary" title="锁定屏幕">
            <span class="icon-lock"></span>
          </button>
          {% block header_actions %}{% endblock %}
        </nav>
      </header>

      <main class="app-main">
        {% block content %}{% endblock %}
      </main>

      <footer class="global-footer" aria-label="Global footer">
        <div class="footer-content">
          <a class="footer-link" href="{{ url_for('guide') }}">使用手册</a>
          <span class="footer-text">CopyEZ</span>
        </div>
      </footer>
    </div>

    <!-- Toast 通知容器 -->
    <div id="toast-container" class="toast-container"></div>
    
    <!-- 确认对话框容器 -->
    <div id="confirm-dialog-overlay" class="confirm-dialog-overlay" style="display: none;">

          </g>
        </svg>
        <p class="confirm-dialog-heading"></p>
        <p class="confirm-dialog-description"></p>
        <div class="confirm-dialog-button-container">
          <button class="confirm-dialog-accept-button">OK</button>
          <button class="confirm-dialog-decline-button">Cancel</button>
        </div>
      </div>
    </div>
    
    <!-- 回到顶部按钮 -->
    <button id="scroll-to-top" class="scroll-to-top" aria-label="Scroll to top">
      <div class="scroll-to-top-scroll"></div>
    </button>
    
    <!-- 求真务实·滚轮开门见锁沉浸式锁定系统 -->
    <div id="lock-screen">
      <!-- 第一层：图片文字层（z-index: 100，完全静止不动） -->
      <div id="lock-text-layer">
        <img src="{{ url_for('static', filename='images/实事求是.jpg') }}" alt="实事求是" class="lock-img" />
      </div>
      
      <!-- 第二层：幕布层（z-index: 60，初始在中间合拢） -->
      <div class="curtain-top"></div>
      <div class="curtain-bottom"></div>
      
      <!-- 第三层：密码层 Hidden Lake（z-index: 50，初始opacity: 0） -->
      <div id="lock-password-layer">
        <input 
          type="password" 
          id="lock-password-input" 
          placeholder="输入密码解锁"
          autocomplete="off"
        />
      </div>
    </div>
    
    {% block scripts %}{% endblock %}
    <script src="{{ url_for('static', filename='main.js') }}"></script>
  </body>
</html>
