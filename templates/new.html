{% extends "base.html" %}

{% block title %}新建素材 - CopyEZ{% endblock %}

{% block content %}
  <section class="page-section">
    <h1 class="page-heading">新建素材</h1>

    {% if error %}
      <div class="form-error">{{ error }}</div>
    {% endif %}

    <form method="post" class="note-form">
      <div class="form-row form-row-title">
        <label for="title">标题</label>
        <div class="title-input-wrapper">
          <input
            type="text"
            id="title"
            name="title"
            required
            value="{{ title or '' }}"
          />
        </div>
      </div>

      <div class="form-row">
        <label for="mainCategory">一级分类</label>
        <select id="mainCategory" name="mainCategory">
          <option value="">请选择（可选）</option>
          <option value="全文" {% if mainCategory == '全文' %}selected{% endif %}>全文</option>
          <option value="框架" {% if mainCategory == '框架' %}selected{% endif %}>框架</option>
          <option value="短文摘要" {% if mainCategory == '短文摘要' %}selected{% endif %}>短文摘要</option>
        </select>
      </div>

      <div class="form-row">
        <label for="subCategory">二级分类</label>
        <input
          type="text"
          id="subCategory"
          name="subCategory"
          placeholder="从下拉列表选择，或输入新分类（保存时自动添加）"
          value="{{ subCategory or '' }}"
        />
      </div>

      <div class="form-row">
        <label for="tags_json">三级标签（可选）</label>
        <div id="tag-selector-container"></div>
        <input
          type="hidden"
          id="tags_json"
          name="tags_json"
          value="[]"
        />
      </div>

      <div class="form-row form-row-inline">
        <div class="form-col">
          <label for="publishDate">发布日期（可选）</label>
          <input
            type="date"
            id="publishDate"
            name="publishDate"
          />
        </div>
        <div class="form-col">
          <label for="sourceUrl">原文链接（可选）</label>
          <input
            type="url"
            id="sourceUrl"
            name="sourceUrl"
            placeholder="https://example.com/article"
          />
        </div>
      </div>

      <div class="form-row">
        <label for="content">内容</label>
        <textarea
          id="content"
          name="content"
          rows="20"
          required
          placeholder="支持用 # 一级标题、## 二级标题、### 三级标题 来表示层级；其他行会自动按公文正文样式排版。"
        >{{ content or '' }}</textarea>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn-primary">保存</button>
        <a href="{{ url_for('notes') }}" class="btn-secondary">取消</a>
      </div>
    </form>
  </section>
  <script src="{{ url_for('static', filename='category-selector.js') }}"></script>
  <script>
    (function () {
      let categorySelector = null;
      let tagSelector = null;
      
      // 初始化分类选择器
      if (document.getElementById("subCategory")) {
        categorySelector = new CategorySelector("subCategory", {
          mainCategoryInputId: "mainCategory"
        });
      }
      
      // 初始化标签选择器
      if (document.getElementById("tag-selector-container")) {
        tagSelector = new TagSelector("tag-selector-container", "tags_json", {
          placeholder: "点击输入框选择预置标签，或输入新标签后按 Enter 添加"
        });
      }
      
      // 监听一级分类变化，自动刷新分类列表
      const mainCategorySelect = document.getElementById("mainCategory");
      if (mainCategorySelect && categorySelector) {
        mainCategorySelect.addEventListener("change", function() {
          // 一级分类变化时，重新加载分类列表
          categorySelector.loadCategories();
        });
      }
      
      // 表单提交时，保存成功后刷新列表（如果用户在同一页面多次添加）
      const form = document.querySelector(".note-form");
      if (form) {
        form.addEventListener("submit", function(e) {
          // 注意：由于是同步提交，这里只是标记，实际刷新会在页面重新加载时进行
          // 但为了确保数据一致性，我们在提交前先刷新一次列表
          if (categorySelector) {
            categorySelector.loadCategories();
          }
          if (tagSelector) {
            tagSelector.loadTags();
          }
        });
      }
      
    })();
  </script>
{% endblock %}
