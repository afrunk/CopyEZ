<!-- 新增大类弹窗 -->
<div class="modal-overlay" id="groupModal">
  <div class="modal">
    <div class="modal-header">
      <div>
        <h3 id="groupModalTitle">新增大类</h3>
        <p>添加新的分类大类</p>
      </div>
      <button class="modal-close" onclick="closeModal('groupModal')">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="groupModalId">
      <div class="form-group">
        <label class="form-label">大类名称</label>
        <input class="form-input" id="groupModalName" placeholder="例如：设备系统">
      </div>
      <div class="form-group">
        <label class="form-label">图标</label>
        <div class="icon-picker" id="groupIconPicker" style="display:flex;flex-wrap:wrap;gap:8px;">
          <span class="icon-option" data-icon="🏠">🏠</span>
          <span class="icon-option" data-icon="❄️">❄️</span>
          <span class="icon-option" data-icon="💡">💡</span>
          <span class="icon-option" data-icon="🧱">🧱</span>
          <span class="icon-option" data-icon="🚪">🚪</span>
          <span class="icon-option" data-icon="🛁">🛁</span>
          <span class="icon-option" data-icon="🔌">🔌</span>
          <span class="icon-option" data-icon="🪚">🪚</span>
          <span class="icon-option" data-icon="🛋️">🛋️</span>
          <span class="icon-option" data-icon="📦">📦</span>
          <span class="icon-option" data-icon="🌿">🌿</span>
          <span class="icon-option" data-icon="⚙️">⚙️</span>
          <span class="icon-option" data-icon="🔧">🔧</span>
          <span class="icon-option" data-icon="🎨">🎨</span>
          <span class="icon-option" data-icon="📺">📺</span>
          <span class="icon-option" data-icon="🛒">🛒</span>
        </div>
        <input type="hidden" id="groupModalIcon" value="🏠">
      </div>
      <div class="form-group">
        <label class="form-label">说明</label>
        <textarea class="form-textarea" id="groupModalDesc" rows="2" placeholder="简要描述这个大类的用途"></textarea>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">排序</label>
          <input class="form-input" type="number" id="groupModalOrder" value="0" min="0">
        </div>
        <div class="form-group">
          <label class="form-label">是否启用</label>
          <select class="form-select" id="groupModalEnabled">
            <option value="1">启用</option>
            <option value="0">禁用</option>
          </select>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('groupModal')">取消</button>
      <button class="btn btn-primary" onclick="saveGroupModal()">保存</button>
    </div>
  </div>
</div>

        <div class="form-group">
          <label class="form-label">当前状态</label>
          <select class="form-select" id="subcatModalStatus">
            <option value="not-started">未开始</option>
            <option value="comparing">比价中</option>
            <option value="selected">已选方案</option>
            <option value="ongoing">进行中</option>
            <option value="pending">待确认</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">预算金额</label>
          <input class="form-input" id="subcatModalBudget" placeholder="例如：28000">
        </div>
        <div class="form-group">
          <label class="form-label">展示方式</label>
          <select class="form-select" id="subcatModalView">
            <option value="card">卡片模式</option>
            <option value="table">表格模式</option>
            <option value="list">清单模式</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">备注</label>
        <textarea class="form-textarea" id="subcatModalNote" rows="2" placeholder="补充说明、注意事项"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('subcatModal')">取消</button>
      <button class="btn btn-primary" onclick="saveSubcatModal()">保存</button>
    </div>
  </div>
</div>

<!-- Toast 提示 -->
<style>
.toast-message {
  position: fixed;
  right: 24px;
  bottom: 24px;
  background: #1C1917;
  color: #fff;
  padding: 12px 18px;
  border-radius: 12px;
  z-index: 300;
  box-shadow: 0 8px 24px rgba(0,0,0,.18);
  opacity: 0;
  transform: translateY(10px);
  transition: all .2s ease;
  font-size: .875rem;
  font-weight: 500;
}
.toast-message.show {
  opacity: 1;
  transform: translateY(0);
}
</style>

</body>
</html>
