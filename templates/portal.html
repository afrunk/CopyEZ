<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <title>CopyEZ | 公文素材库</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei',
          sans-serif;
        background: radial-gradient(circle at top left, #f2f6ff 0, #ffffff 48%, #f9fafb 100%);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        overflow-x: hidden;
        color: #111827;
      }

      .portal-container {
        width: 100%;
        max-width: 1120px;
        display: grid;
        grid-template-columns: minmax(0, 3fr) minmax(0, 2.5fr);
        align-items: center;
        gap: 56px;
        padding: 56px 24px;
      }

      .portal-left {
        display: flex;
        flex-direction: column;
        gap: 24px;
      }

      .product-badge {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 6px 14px;
        border-radius: 999px;
        background: rgba(37, 99, 235, 0.06);
        color: #1d4ed8;
        font-size: 12px;
        font-weight: 500;
        width: fit-content;
      }

      .product-badge-dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: #22c55e;
        box-shadow: 0 0 0 6px rgba(34, 197, 94, 0.25);
      }

      .portal-title-main {
        font-size: 36px;
        line-height: 1.25;
        font-weight: 650;
        letter-spacing: 0.03em;
      }

      .portal-title-highlight {
        color: #1d4ed8;
      }

      .portal-subtitle {
        margin-top: 6px;
        font-size: 15px;
        color: #4b5563;
        line-height: 1.8;
        max-width: 30rem;
      }

      .portal-metadata-row {
        display: flex;
        flex-wrap: wrap;
        gap: 16px;
        margin-top: 10px;
        font-size: 12px;
        color: #6b7280;
      }

      .portal-metadata-item {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 4px 10px;
        border-radius: 999px;
        background: rgba(17, 24, 39, 0.04);
      }

      .portal-metadata-dot {
        width: 6px;
        height: 6px;
        border-radius: 999px;
        background: #9ca3af;
      }

      .portal-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 18px;
      }

      .portal-primary-btn,
      .portal-secondary-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 10px 18px;
        border-radius: 999px;
        border: none;
        cursor: pointer;
        font-size: 14px;
        font-weight: 500;
        text-decoration: none;
        transition: all 0.18s ease-out;
      }

      .portal-primary-btn {
        background: linear-gradient(135deg, #2563eb, #1d4ed8);
        color: #ffffff;
        box-shadow: 0 12px 22px rgba(37, 99, 235, 0.26);
      }

      .portal-primary-btn:hover {
        transform: translateY(-1px);
        box-shadow: 0 16px 32px rgba(37, 99, 235, 0.32);
      }

      .portal-secondary-btn {
        background: rgba(255, 255, 255, 0.7);
        color: #111827;
        border: 1px solid rgba(148, 163, 184, 0.55);
      }

      .portal-secondary-btn:hover {
        background: rgba(249, 250, 251, 0.95);
      }

      .portal-arrow {
        font-size: 15px;
      }

      .portal-right {
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .portal-entry-card {
        background: #ffffff;
        border-radius: 22px;
        padding: 28px 26px;
        box-shadow: 0 22px 60px rgba(15, 23, 42, 0.18);
        text-decoration: none;
        color: inherit;
        display: block;
        width: 100%;
        max-width: 420px;
        border: 1px solid rgba(226, 232, 240, 0.95);
        position: relative;
        overflow: hidden;
      }

      .portal-card-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
      }

      .portal-card-title {
        font-size: 18px;
        font-weight: 600;
      }

      .portal-card-tag {
        font-size: 11px;
        padding: 4px 10px;
        border-radius: 999px;
        background: rgba(37, 99, 235, 0.06);
        color: #1d4ed8;
      }

      .portal-card-body-title {
        font-size: 22px;
        font-weight: 650;
        margin-bottom: 8px;
      }

      .portal-card-body-desc {
        font-size: 13px;
        color: #6b7280;
        line-height: 1.7;
        margin-bottom: 18px;
      }

      .portal-card-meta {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 11px;
        color: #9ca3af;
      }

      .portal-card-pill {
        padding: 3px 10px;
        border-radius: 999px;
        background: rgba(15, 23, 42, 0.03);
      }

      .portal-card-accent {
        position: absolute;
        inset: auto -46px -46px auto;
        width: 140px;
        height: 140px;
        background: radial-gradient(circle at 20% 20%, #bfdbfe, #1d4ed8);
        opacity: 0.12;
        filter: blur(4px);
        pointer-events: none;
      }

      @media (max-width: 900px) {
        .portal-container {
          grid-template-columns: minmax(0, 1fr);
          padding-top: 40px;
          padding-bottom: 40px;
          gap: 40px;
        }

        .portal-title-main {
          font-size: 28px;
        }

        .portal-subtitle {
          font-size: 14px;
        }

        .portal-right {
          order: -1;
        }
      }

      @media (max-width: 600px) {
        body {
          justify-content: flex-start;
        }

        .portal-container {
          padding: 24px 16px 40px;
        }

        .portal-entry-card {
          box-shadow: 0 14px 32px rgba(15, 23, 42, 0.18);
          padding: 22px 20px;
        }
      }
    </style>
  </head>
  <body>
    <div class="portal-container">
      <div class="portal-left">
        <div class="product-badge">
          <span class="product-badge-dot"></span>
          已部署 · 日常写作工作台
        </div>
        <div>
          <h1 class="portal-title-main">
            CopyEZ
            <span class="portal-title-highlight">公文素材库</span>
          </h1>
          <p class="portal-subtitle">
            深度贴合公文写作逻辑，把“平时材料”变成“随手可用”的知识库。支持按要素拆分、场景检索和沉浸式阅读，让每一次落笔都有素材可依。
          </p>
        </div>
        <div class="portal-metadata-row">
          <span class="portal-metadata-item">
            <span class="portal-metadata-dot"></span>
            私有部署 · 本地数据不出机
          </span>
          <span class="portal-metadata-item">
            <span class="portal-metadata-dot"></span>
            针对公文场景优化交互
          </span>
          <span class="portal-metadata-item">
            <span class="portal-metadata-dot"></span>
            支持多维标签与要素管理
          </span>
        </div>
        <div class="portal-actions">
          <a href="{{ url_for('notes') }}" class="portal-primary-btn">
            进入素材工作台
            <span class="portal-arrow">↗</span>
          </a>
          <a href="{{ url_for('guide') }}" class="portal-secondary-btn">
            查看使用指南
          </a>
        </div>
      </div>

      <div class="portal-right">
        <a href="{{ url_for('notes') }}" class="portal-entry-card">
          <div class="portal-card-header">
            <div class="portal-card-title">今日写作入口</div>
            <div class="portal-card-tag">沉浸式素材阅读</div>
          </div>
          <div>
            <div class="portal-card-body-title">从“好段落”开始构稿</div>
            <div class="portal-card-body-desc">
              先浏览，再下笔。按专题、要素和场景组织公文素材，支持一键进入阅读器视图，保持写作时的专注与连贯。
            </div>
          </div>
          <div class="portal-card-meta">
            <span class="portal-card-pill">支持标签筛选 · 组合检索</span>
            <span>CopyEZ · 公文写作助手</span>
          </div>
          <div class="portal-card-accent"></div>
        </a>
      </div>
    </div>
  </body>
</html>
