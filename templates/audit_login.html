<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <title>TAIYI | 数字化个人工作台</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --color-bg: #f8fafc;
      --color-bg-card: #ffffff;
      --color-text-primary: #1f2937;
      --color-text-secondary: #6b7280;
      --color-text-muted: #9ca3af;
      --color-border: #e5e7eb;
      --color-brand-purple: #8b5cf6;
      --color-brand-purple-light: #f3e8ff;
      --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.05), 0 2px 4px -2px rgb(0 0 0 / 0.05);
      --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.05), 0 4px 6px -4px rgb(0 0 0 / 0.05);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
      background: var(--color-bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--color-text-primary);
    }

    .login-container {
      background: var(--color-bg-card);
      border-radius: 16px;
      padding: 40px 32px;
      width: 100%;
      max-width: 400px;
      border: 1px solid var(--color-border);
      box-shadow: var(--shadow-md);
    }

    .login-title {
      font-size: 24px;
      font-weight: 600;
      text-align: center;
      margin-bottom: 8px;
      color: var(--color-text-primary);
    }

    .login-subtitle {
      font-size: 13px;
      color: var(--color-text-secondary);
      text-align: center;
      margin-bottom: 32px;
    }

    .login-icon {
      text-align: center;
      margin-bottom: 20px;
      color: var(--color-brand-purple);
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      color: var(--color-text-secondary);
      margin-bottom: 8px;
    }

    .form-group input {
      width: 100%;
      padding: 12px 16px;
      border-radius: 8px;
      border: 1px solid var(--color-border);
      background: var(--color-bg-card);
      color: var(--color-text-primary);
      font-size: 14px;
      outline: none;
      transition: all 0.2s;
      box-shadow: var(--shadow-sm);
    }

    .form-group input:focus {
      border-color: var(--color-brand-purple);
      box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.1);
    }

    .form-group input::placeholder {
      color: var(--color-text-muted);
    }

    .login-btn {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      background: var(--color-brand-purple);
      color: #fff;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .login-btn:hover {
      background: #7c3aed;
      transform: translateY(-1px);
      box-shadow: var(--shadow-md);
    }

    .login-btn:active {
      transform: translateY(0);
    }

    .error-msg {
      color: #ef4444;
      font-size: 13px;
      text-align: center;
      margin-top: 16px;
    }

    .back-link {
      text-align: center;
      margin-top: 24px;
    }

    .back-link a {
      color: var(--color-text-secondary);
      font-size: 13px;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .back-link a:hover {
      color: var(--color-brand-purple);
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-icon">
      <i data-lucide="shield-check" style="width: 48px; height: 48px;"></i>
    </div>
    <h1 class="login-title">日常效能审计</h1>
    <p class="login-subtitle">请输入访问密码</p>
    <form id="login-form">
      <div class="form-group">
        <label for="password">访问密码</label>
        <input type="password" id="password" name="password" placeholder="请输入密码" required />
      </div>
      <button type="submit" class="login-btn">进入审计模块</button>
    </form>
    {% if error %}
    <p class="error-msg">{{ error }}</p>
    {% endif %}
    <div class="back-link">
      <a href="{{ url_for('index') }}">
        <i data-lucide="arrow-left" style="width: 14px; height: 14px;"></i>
        返回工作台
      </a>
    </div>
  </div>
  <script>
    lucide.createIcons();
  </script>
  <script>
    document.getElementById('login-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      const password = document.getElementById('password').value;
      try {
        const response = await fetch('/api/audit/verify', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password })
        });
        const data = await response.json();
        if (data.success) {
          window.location.href = '/audit';
        } else {
          alert('密码错误，请重试');
        }
      } catch (err) {
        alert('验证失败，请重试');
      }
    });
  </script>
</body>
</html>
