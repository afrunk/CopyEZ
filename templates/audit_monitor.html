<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>访问监控</title>
  <style>
    :root {
      --bg: #f5f5f7;
      --card-bg: #ffffff;
      --text-primary: #1d1d1f;
      --text-secondary: #86868b;
      --accent-red: #FF3B30;
      --accent-red-bg: #fff5f5;
      --accent-gray: rgba(134, 134, 139, 0.3);
      --accent-gray-bg: rgba(134, 134, 139, 0.05);
      --radius: 14px;
      --spacing: 20px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
      color: var(--text-primary);
      min-height: 100vh;
      padding: var(--spacing);
      padding-bottom: 80px;
    }

    .header {
      padding: 12px 0 28px;
      text-align: center;
    }

    .header h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.3px;
      color: var(--text-primary);
    }

    .header p {
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 6px;
    }

    .status-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-top: 10px;
      font-size: 12px;
      color: var(--text-secondary);
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent-gray);
      animation: pulse 2s infinite;
    }

    .status-dot.active {
      background: #34c759;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .feeds {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .feed-card {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 14px 16px;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
      transition: opacity 0.25s ease;
      line-height: 1.6;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .feed-main {
      flex: 1;
      min-width: 0;
    }

    .feed-top {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }

    .feed-role {
      letter-spacing: 0.3px;
      font-size: 16px;
    }

    .feed-ip {
      font-size: 14px;
      color: var(--text-primary);
      word-break: break-all;
    }

    .feed-badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 20px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .feed-time {
      font-size: 12px;
      color: var(--text-secondary);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .feed-right {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .feed-actions {
      margin-top: 10px;
      padding-top: 8px;
      border-top: 1px solid rgba(0,0,0,0.06);
    }

    .feed-action-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      padding: 4px 0;
      font-size: 12px;
      line-height: 1.5;
    }

    .feed-action-label {
      color: var(--text-primary);
      flex: 1;
      min-width: 0;
    }

    .feed-action-time {
      color: var(--text-secondary);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .feed-card.guest .feed-action-label { color: #922; }
    .feed-card.admin .feed-action-label { color: var(--text-secondary); }

    /* 访客 */
    .feed-card.guest {
      border-left: 3px solid var(--accent-red);
      background: var(--accent-red-bg);
    }

    .feed-card.guest .feed-role {
      color: var(--accent-red);
      font-weight: 700;
    }

    .feed-card.guest .feed-ip {
      color: #b91c1c;
      font-weight: 500;
    }

    .feed-card.guest .feed-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent-red);
      flex-shrink: 0;
      animation: blink 1.5s infinite;
    }

    .feed-card.guest .feed-badge {
      background: rgba(255, 59, 48, 0.15);
      color: #c41e1e;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.35; }
    }

    /* 管理员 */
    .feed-card.admin {
      border-left: 3px solid transparent;
      background: var(--accent-gray-bg);
      opacity: 0.6;
    }

    .feed-card.admin .feed-role {
      color: var(--text-secondary);
      font-weight: 400;
    }

    .feed-card.admin .feed-ip {
      color: var(--text-secondary);
    }

    .feed-card.admin .feed-dot {
      display: none;
    }

    .feed-card.admin .feed-badge {
      background: rgba(134, 134, 139, 0.15);
      color: var(--text-secondary);
    }

    .feed-empty {
      text-align: center;
      padding: 48px 20px;
      color: var(--text-secondary);
      font-size: 14px;
    }

    /* 手机适配：更紧凑、不乱 */
    @media (max-width: 480px) {
      body {
        padding: 12px 12px 60px;
      }

      .header {
        padding: 8px 0 18px;
      }

      .header h1 {
        font-size: 18px;
      }

      .header p {
        font-size: 11px;
      }

      .status-bar {
        font-size: 11px;
        margin-top: 6px;
      }

      .feeds {
        gap: 10px;
      }

      .feed-card {
        padding: 12px 14px;
        border-radius: 10px;
        flex-direction: column;
        align-items: flex-start;
        gap: 6px;
      }

      .feed-main {
        width: 100%;
      }

      .feed-role {
        font-size: 15px;
      }

      .feed-ip {
        font-size: 13px;
      }

      .feed-badge {
        font-size: 10px;
        padding: 2px 6px;
      }

      .feed-time {
        font-size: 11px;
      }

      .feed-actions {
        margin-top: 8px;
        padding-top: 6px;
      }

      .feed-action-row {
        font-size: 11px;
      }
    }

    .feed-card.just-inserted {
      animation: slideIn 0.3s ease-out;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>访问监控</h1>
    <p>/audit 访问记录</p>
    <div class="status-bar">
      <div class="status-dot active" id="statusDot"></div>
      <span id="statusText">实时监测中 · 每 3 秒刷新</span>
    </div>
  </div>

  <div class="feeds" id="feeds">
    <div class="feed-empty" id="emptyHint">暂无访问记录</div>
  </div>

  <script>
    const IS_ADMIN = document.cookie.includes("is_admin=true");

    // 按「访客/管理员 + IP」归类，每组保留操作列表（操作类型 + 时间）
    function groupEvents(events) {
      const map = {};
      for (const e of events) {
        const key = (e.is_admin ? "admin:" : "guest:") + (e.ip_address || "-");
        if (!map[key]) {
          map[key] = {
            ip_address: e.ip_address || "-",
            is_admin: e.is_admin,
            actions: []
          };
        }
        const label = e.action_detail ? (e.action_type + " · " + e.action_detail) : e.action_type;
        map[key].actions.push({ label: label, at: e.at });
        if (!map[key].lastTime || e.at > map[key].lastTime) map[key].lastTime = e.at;
      }
      return Object.values(map).sort((a, b) => (b.lastTime || "").localeCompare(a.lastTime || ""));
    }

    function renderCards(groups) {
      const feeds = document.getElementById("feeds");
      if (groups.length === 0) {
        feeds.innerHTML = '<div class="feed-empty" id="emptyHint">暂无访问与操作记录</div>';
        return;
      }

      let html = "";
      for (const g of groups) {
        const isSelf = IS_ADMIN && g.is_admin;
        const type = isSelf ? "admin" : "guest";
        const roleLabel = isSelf ? "我（管理员）" : "访客";
        const actionsHtml = g.actions.slice(0, 20).map(a =>
          `<div class="feed-action-row"><span class="feed-action-label">${escapeHtml(a.label)}</span><span class="feed-action-time">${escapeHtml(a.at)}</span></div>`
        ).join("");
        html += `
          <div class="feed-card ${type}">
            <div class="feed-main">
              <div class="feed-top">
                <span class="feed-dot"></span>
                <span class="feed-role">${roleLabel}</span>
              </div>
              <div class="feed-ip">${escapeHtml(g.ip_address)}</div>
              <div class="feed-actions">${actionsHtml}</div>
            </div>
          </div>
        `;
      }
      feeds.innerHTML = html;
    }

    function escapeHtml(s) {
      const div = document.createElement("div");
      div.textContent = s;
      return div.innerHTML;
    }

    async function loadLogs() {
      try {
        const resp = await fetch("/api/logs");
        if (!resp.ok) return;
        const events = await resp.json();
        const groups = groupEvents(events);
        renderCards(groups);
      } catch (e) {
        console.error("加载失败", e);
      }
    }

    loadLogs();
    setInterval(loadLogs, 3000);
  </script>

</body>
</html>
