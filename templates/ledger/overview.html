<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <title>账单概览 - LedgerEZ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    :root {
      --bg: #f5f6f8;
      --card: #ffffff;
      --green: #10b981;
      --green-dark: #059669;
      --green-light: #d1fae5;
      --green-50: #ecfdf5;
      --text: #1f2937;
      --text-2: #6b7280;
      --text-3: #9ca3af;
      --border: #e5e7eb;
      --income: #22c55e;
      --expense: #ef4444;
      --radius: 20px;
      --radius-sm: 12px;
      --shadow: 0 2px 8px rgba(0,0,0,0.06), 0 8px 24px rgba(0,0,0,0.04);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    .header {
      background: linear-gradient(148deg, var(--green) 0%, var(--green-dark) 100%);
      color: #fff;
      padding: 48px 24px 32px;
      border-radius: 0 0 32px 32px;
      min-height: 180px;
      position: relative;
      overflow: hidden;
    }
    .header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 70% 20%, rgba(255,255,255,0.15) 0%, transparent 60%);
      pointer-events: none;
    }
    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      position: relative;
    }
    .header-title {
      font-size: 20px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
      opacity: 0.95;
    }
    .header-actions { display: flex; gap: 8px; }
    .header-btn {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: rgba(255,255,255,0.18);
      border: none; color: #fff;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: background 0.2s;
    }
    .header-btn:hover { background: rgba(255,255,255,0.28); }

    .back-nav {
      display: flex; align-items: center; gap: 8px;
      color: #fff; opacity: 0.85;
      font-size: 14px; font-weight: 500;
      text-decoration: none;
      position: relative;
      margin-bottom: 16px;
    }
    .back-nav:hover { opacity: 1; }

    /* ── Month nav ── */
    .month-nav {
      display: flex; align-items: center; justify-content: center;
      gap: 16px; margin-bottom: 20px;
      position: relative;
    }
    .month-nav-btn {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      border: none; color: #fff;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
    }
    .month-nav-btn:hover { background: rgba(255,255,255,0.35); }
    .month-label {
      font-size: 17px; font-weight: 600;
      min-width: 90px; text-align: center;
    }

    /* ── Stats row ── */
    .stats-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      position: relative;
    }
    .stat-card {
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(12px);
      border-radius: var(--radius-sm);
      padding: 12px 10px;
      text-align: center;
    }
    .stat-label { font-size: 11px; opacity: 0.7; margin-bottom: 4px; font-weight: 500; }
    .stat-value { font-size: 18px; font-weight: 700; line-height: 1; }
    .stat-value.income { color: #a7f3d0; }
    .stat-value.expense { color: #fecaca; }
    .stat-value.balance { color: #fff; }

    /* ── Content ── */
    .content { padding: 20px; }

    /* ── Card ── */
    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px;
      margin-bottom: 16px;
    }
    .card-title {
      font-size: 15px; font-weight: 700;
      margin-bottom: 16px;
      display: flex; align-items: center; gap: 8px;
      color: var(--text);
    }
    .card-title i { color: var(--green); }

    /* ── Bar chart ── */
    .bar-chart { display: flex; align-items: flex-end; gap: 6px; height: 100px; }
    .bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .bar {
      width: 100%;
      border-radius: 6px 6px 0 0;
      min-height: 4px;
      transition: height 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
      position: relative;
    }
    .bar.income-bar { background: linear-gradient(180deg, var(--income) 0%, rgba(34,197,94,0.6) 100%); }
    .bar.expense-bar { background: linear-gradient(180deg, var(--expense) 0%, rgba(239,68,68,0.6) 100%); }
    .bar-label { font-size: 10px; color: var(--text-3); text-align: center; white-space: nowrap; }
    .bar-value { font-size: 10px; font-weight: 600; color: var(--text-2); }

    /* ── Pie chart area ── */
    .pie-wrap {
      display: flex;
      align-items: center;
      gap: 24px;
    }
    .pie-chart-container {
      width: 140px; height: 140px;
      flex-shrink: 0;
      position: relative;
    }
    .pie-legend { flex: 1; }
    .legend-item {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 10px;
      font-size: 13px;
    }
    .legend-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .legend-name { flex: 1; color: var(--text); }
    .legend-amount { font-weight: 600; color: var(--text); }
    .legend-pct { color: var(--text-3); font-size: 12px; min-width: 36px; text-align: right; }

    /* ── Trend list ── */
    .trend-list {}
    .trend-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }
    .trend-item:last-child { border-bottom: none; }
    .trend-date {
      font-size: 12px; color: var(--text-3);
      min-width: 48px; text-align: center;
    }
    .trend-bar-wrap { flex: 1; display: flex; flex-direction: column; gap: 4px; }
    .trend-bar-row { display: flex; align-items: center; gap: 6px; }
    .trend-bar-label { font-size: 11px; color: var(--text-3); width: 20px; }
    .trend-bar-track { flex: 1; height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
    .trend-bar-fill { height: 100%; border-radius: 4px; transition: width 0.6s ease; }
    .trend-bar-fill.income { background: var(--income); }
    .trend-bar-fill.expense { background: var(--expense); }
    .trend-bar-val { font-size: 11px; font-weight: 600; min-width: 52px; text-align: right; }
    .trend-bar-val.income { color: var(--income); }
    .trend-bar-val.expense { color: var(--expense); }

    /* ── Total balance card ── */
    .balance-hero {
      text-align: center;
      padding: 8px 0 4px;
    }
    .balance-hero-label { font-size: 13px; color: var(--text-2); margin-bottom: 4px; }
    .balance-hero-value { font-size: 32px; font-weight: 700; color: var(--green); }
    .balance-hero-value.negative { color: var(--expense); }

    /* ── Account summary ── */
    .account-summary { margin-top: 4px; }
    .account-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }
    .account-item:last-child { border-bottom: none; }
    .account-icon {
      width: 32px; height: 32px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
    }
    .account-info { flex: 1; }
    .account-name { font-size: 14px; font-weight: 600; }
    .account-balance { font-size: 12px; color: var(--text-2); }
    .account-val { font-size: 15px; font-weight: 700; }

    /* ── Empty chart ── */
    .empty-chart {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 32px;
      color: var(--text-3);
      gap: 8px;
    }
    .empty-chart i { opacity: 0.4; }
    .empty-chart p { font-size: 13px; text-align: center; }

    /* ── Legend line ── */
    .chart-legend {
      display: flex; justify-content: center;
      gap: 20px; margin-top: 8px;
      font-size: 12px; color: var(--text-2);
    }
    .chart-legend span { display: flex; align-items: center; gap: 5px; }
    .chart-legend-dot { width: 8px; height: 8px; border-radius: 50%; }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header-top">
      <div class="header-title">
        <i data-lucide="bar-chart-2" style="width:20px;height:20px;"></i>
        账单概览
      </div>
      <div class="header-actions">
        <button class="header-btn" onclick="location.href='{{ url_for("ledger.ledger_home") }}'" title="记一笔">
          <i data-lucide="plus" style="width:18px;height:18px;"></i>
        </button>
        <button class="header-btn" onclick="location.href='{{ url_for("index") }}'" title="返回门户">
          <i data-lucide="home" style="width:18px;height:18px;"></i>
        </button>
      </div>
    </div>

    <a href="{{ url_for('ledger.ledger_home') }}" class="back-nav">
      <i data-lucide="arrow-left" style="width:16px;height:16px;"></i>
      返回记账本
    </a>

    <div class="month-nav">
      <button class="month-nav-btn" onclick="changeMonth(-1)">
        <i data-lucide="chevron-left" style="width:16px;height:16px;"></i>
      </button>
      <div class="month-label" id="monthLabel">加载中...</div>
      <button class="month-nav-btn" onclick="changeMonth(1)">
        <i data-lucide="chevron-right" style="width:16px;height:16px;"></i>
      </button>
    </div>

    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-label">收入</div>
        <div class="stat-value income" id="statIncome">¥0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">支出</div>
        <div class="stat-value expense" id="statExpense">¥0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">结余</div>
        <div class="stat-value balance" id="statBalance">¥0</div>
      </div>
    </div>
  </header>

  <div class="content">
    <!-- Balance hero -->
    <div class="card">
      <div class="balance-hero">
        <div class="balance-hero-label">账户总资产</div>
        <div class="balance-hero-value" id="totalBalance">¥0.00</div>
      </div>
      <div class="account-summary" id="accountSummary"></div>
    </div>

    <!-- Expense breakdown -->
    <div class="card">
      <div class="card-title">
        <i data-lucide="pie-chart" style="width:18px;height:18px;"></i>
        支出分布
      </div>
      <div id="pieSection"></div>
    </div>

    <!-- Monthly trend -->
    <div class="card">
      <div class="card-title">
        <i data-lucide="trending-up" style="width:18px;height:18px;"></i>
        近月趋势
      </div>
      <div id="trendSection"></div>
    </div>
  </div>

<script>
  lucide.createIcons();

  let curYear = new Date().getFullYear();
  let curMonth = new Date().getMonth() + 1;
  let stats = null;
  let trend = [];
  let accounts = [];

  const MONTH_NAMES = ['一月','二月','三月','四月','五月','六月',
                       '七月','八月','九月','十月','十一月','十二月'];

  document.addEventListener('DOMContentLoaded', async () => {
    await fetch('/ledger/api/init', { method: 'POST' });
    await loadData();
  });

  async function loadData() {
    [stats, trend, accounts] = await Promise.all([
      fetch(`/ledger/api/stats/monthly?year=${curYear}&month=${curMonth}`).then(r => r.json()),
      fetch('/ledger/api/stats/trend').then(r => r.json()),
      fetch('/ledger/api/accounts').then(r => r.json()),
    ]);
    render();
  }

  function render() {
    document.getElementById('monthLabel').textContent = `${curYear}年 ${MONTH_NAMES[curMonth-1]}`;
    document.getElementById('statIncome').textContent = `¥${fmt(stats.income)}`;
    document.getElementById('statExpense').textContent = `¥${fmt(stats.expense)}`;
    const bal = stats.balance;
    const el = document.getElementById('statBalance');
    el.textContent = `¥${fmt(bal)}`;
    el.className = 'stat-value ' + (bal < 0 ? 'expense' : 'balance');

    const totalBal = stats.total_balance;
    const totalEl = document.getElementById('totalBalance');
    totalEl.textContent = `¥${fmt(totalBal)}`;
    totalEl.className = 'balance-hero-value' + (totalBal < 0 ? ' negative' : '');
    lucide.createIcons();

    renderAccounts();
    renderPie();
    renderTrend();
  }

  function renderAccounts() {
    const el = document.getElementById('accountSummary');
    if (!accounts.length) {
      el.innerHTML = '<div style="font-size:13px;color:var(--text-3);text-align:center;padding:8px 0;">暂无账户记录</div>';
      return;
    }
    el.innerHTML = accounts.map(a => `
      <div class="account-item">
        <div class="account-icon" style="background:${a.color}20;color:${a.color};">
          <i data-lucide="${a.icon}" style="width:14px;height:14px;"></i>
        </div>
        <div class="account-info">
          <div class="account-name">${a.name}</div>
          <div class="account-balance">余额</div>
        </div>
        <div class="account-val" style="color:${a.color};">¥${fmt(a.balance)}</div>
      </div>
    `).join('');
    lucide.createIcons();
  }

  function renderPie() {
    const el = document.getElementById('pieSection');
    const cats = stats.category_breakdown;
    if (!cats || cats.length === 0) {
      el.innerHTML = `
        <div class="empty-chart">
          <i data-lucide="pie-chart" style="width:40px;height:40px;"></i>
          <p>本月暂无支出记录</p>
        </div>`;
      lucide.createIcons();
      return;
    }

    const total = cats.reduce((s, c) => s + c.amount, 0);
    const colors = cats.map(c => c.color);

    // Build donut SVG
    const cx = 70, cy = 70, r = 55, stroke = 26;
    let cumAngle = -Math.PI / 2;
    const paths = cats.map(c => {
      const angle = (c.amount / total) * 2 * Math.PI;
      const x1 = cx + r * Math.cos(cumAngle);
      const y1 = cy + r * Math.sin(cumAngle);
      const x2 = cx + r * Math.cos(cumAngle + angle);
      const y2 = cy + r * Math.sin(cumAngle + angle);
      const large = angle > Math.PI ? 1 : 0;
      const d = `M ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2}`;
      cumAngle += angle;
      return `<path d="${d}" fill="none" stroke="${c.color}" stroke-width="${stroke}" stroke-linecap="round" />`;
    });

    const centerPct = total > 0 ? ((cats[0].amount / total) * 100).toFixed(0) : 0;
    const centerName = total > 0 ? cats[0].name : '';

    el.innerHTML = `
      <div class="pie-wrap">
        <div class="pie-chart-container">
          <svg viewBox="0 0 140 140" width="140" height="140">
            ${paths.join('')}
            <text x="70" y="64" text-anchor="middle" font-size="18" font-weight="700" fill="var(--text)">${centerPct}%</text>
            <text x="70" y="80" text-anchor="middle" font-size="10" fill="var(--text-2)">${centerName}</text>
          </svg>
        </div>
        <div class="pie-legend">
          ${cats.map(c => `
            <div class="legend-item">
              <span class="legend-dot" style="background:${c.color};"></span>
              <span class="legend-name">${c.name}</span>
              <span class="legend-amount">¥${fmt(c.amount)}</span>
              <span class="legend-pct">${((c.amount / total) * 100).toFixed(0)}%</span>
            </div>
          `).join('')}
        </div>
      </div>`;
    lucide.createIcons();
  }

  function renderTrend() {
    const el = document.getElementById('trendSection');
    if (!trend || trend.length === 0) {
      el.innerHTML = '<div class="empty-chart"><i data-lucide="trending-up" style="width:40px;height:40px;"></i><p>暂无趋势数据</p></div>';
      lucide.createIcons();
      return;
    }

    const maxVal = Math.max(...trend.map(m => Math.max(m.income, m.expense)), 1);
    const maxBarH = 60;

    el.innerHTML = `
      <div class="bar-chart">
        ${trend.map(m => {
          const ih = Math.max((m.income / maxVal) * maxBarH, 4);
          const eh = Math.max((m.expense / maxVal) * maxBarH, 4);
          return `
            <div class="bar-wrap">
              <div class="bar-value" style="color:var(--income);">${m.income > 0 ? '¥' + fmt(m.income) : ''}</div>
              <div style="display:flex;gap:3px;align-items:flex-end;height:${maxBarH}px;width:100%;">
                <div class="bar income-bar" style="height:${ih}px;flex:1;"></div>
                <div class="bar expense-bar" style="height:${eh}px;flex:1;"></div>
              </div>
              <div class="bar-value" style="color:var(--expense);">${m.expense > 0 ? '¥' + fmt(m.expense) : ''}</div>
              <div class="bar-label">${m.month}月</div>
            </div>`;
        }).join('')}
      </div>
      <div class="chart-legend">
        <span><span class="chart-legend-dot" style="background:var(--income);"></span>收入</span>
        <span><span class="chart-legend-dot" style="background:var(--expense);"></span>支出</span>
      </div>`;
  }

  function changeMonth(delta) {
    curMonth += delta;
    if (curMonth > 12) { curMonth = 1; curYear++; }
    if (curMonth < 1) { curMonth = 12; curYear--; }
    loadData();
  }

  function fmt(n) {
    return (typeof n === 'number' ? n.toFixed(2) : '0.00').replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  }
</script>
</body>
</html>
