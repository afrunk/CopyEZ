{% extends "base.html" %}

{% block title %}编辑素材 - CopyEZ{% endblock %}

{% block content %}
  <section class="page-section page-section-wide">
    <h1 class="page-heading">编辑素材</h1>

    {% if error %}
      <div class="form-error">{{ error }}</div>
    {% endif %}

    <form method="post" class="note-form" id="edit-form" novalidate>
      <div class="edit-layout">
        <aside class="edit-sidebar">
          <div class="edit-sidebar-section">
            <div class="edit-sidebar-section-title">素材信息</div>
      <div class="form-row">
        <label for="mainCategory">一级分类</label>
        <select id="mainCategory" name="mainCategory">
          <option value="">请选择（可选）</option>
          <option value="全文" {% if mainCategory == '全文' %}selected{% endif %}>全文</option>
          <option value="框架" {% if mainCategory == '框架' %}selected{% endif %}>框架</option>
          <option value="短文摘要" {% if mainCategory == '短文摘要' %}selected{% endif %}>短文摘要</option>
        </select>
      </div>

      <div class="form-row">
        <label for="subCategory">二级分类</label>
        <input
          type="text"
          id="subCategory"
          name="subCategory"
          placeholder="从下拉列表选择，或输入新分类（保存时自动添加）"
          value="{{ subCategory or '' }}"
        />
      </div>

      <div class="form-row">
        <label for="tags_json">三级标签（可选）</label>
        <div id="tag-selector-container"></div>
        <input
          type="hidden"
          id="tags_json"
          name="tags_json"
          value="{{ tags_json or '[]' }}"
        />
      </div>

      <div class="form-row form-row-inline form-row-inline-compact">
        <div class="form-col">
          <label for="publishDate">发布日期（可选）</label>
          <input
            type="date"
            id="publishDate"
            name="publishDate"
            value="{{ publishDate or '' }}"
          />
        </div>
        <div class="form-col">
          <label for="sourceUrl">原文链接（可选）</label>
          <div class="source-url-row">
          <input
            type="url"
            id="sourceUrl"
            name="sourceUrl"
            value="{{ sourceUrl or '' }}"
              placeholder="https://mp.weixin.qq.com/..."
            />
            <button
              type="button"
              class="btn-scrape"
              id="btn-scrape"
              title="从原文链接中自动提取标题与正文"
            >
              ✨ 智能提取
            </button>
          </div>
        </div>
      </div>
          </div>

          <div class="edit-sidebar-section">
            <div class="edit-sidebar-section-title">大纲导航</div>
            <div class="editor-outline" id="editor-outline">
              <!-- JS 动态填充大纲 -->
            </div>
          </div>
        </aside>

        <div class="edit-main">
          <div class="form-row form-row-title">
            <label for="title">标题</label>
            <div class="title-input-wrapper">
              <input
                type="text"
                id="title"
                name="title"
                required
                value="{{ title or '' }}"
          />
        </div>
      </div>

          <div class="form-row editor-row">
        <label for="content">内容</label>
            <div class="editor-field">
              <!-- EasyMDE 容器：保持原 textarea，交给 EasyMDE 接管 -->
        <textarea
          id="content"
          name="content"
              >{% if content %}{{ content|e }}{% endif %}</textarea>
            </div>
            <p class="field-help">
              已启用 EasyMDE Markdown 编辑器：<code>#</code>、<code>##</code>、<code>###</code> 为标题，<code>**加粗**</code> 为重点。
              编辑区字体优先使用仿宋 / 等宽字体，一级标题自动加粗并使用深蓝色，方便快速扫视大纲。
            </p>
      </div>

          <div class="edit-actions-dock" aria-label="保存操作">
            <button type="submit" class="btn-primary" id="save-btn">保存</button>
            <button type="button" class="btn-secondary" id="format-btn" title="只整理格式，不保存到数据库">整理格式</button>
            <span id="save-status" class="save-status" style="display: none; margin-left: 12px; color: #666; font-size: 14px;"></span>
        <a href="{{ url_for('view_note', note_id=note.id) }}" class="btn-secondary">取消</a>
          </div>
        </div>
      </div>
    </form>
  </section>

  <!-- EasyMDE 依赖的 FontAwesome 图标库（用于工具栏图标） -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css"
  />
  <!-- EasyMDE 核心样式与脚本 -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.css"
  />
  <script src="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.js"></script>

  <!-- Turndown：用于将 HTML（如 Word 粘贴内容）转换为 Markdown -->
  <script src="https://unpkg.com/turndown/dist/turndown.js"></script>

  <script src="{{ url_for('static', filename='category-selector.js') }}"></script>
  <script>
    (function () {
      // 初始化分类选择器
      if (document.getElementById("subCategory")) {
        new CategorySelector("subCategory", {
          mainCategoryInputId: "mainCategory"
        });
      }
      
      // 初始化标签选择器
      if (document.getElementById("tag-selector-container")) {
        new TagSelector("tag-selector-container", "tags_json", {
          placeholder: "点击输入框选择预置标签，或输入新标签后按 Enter 添加"
        });
      }
      
      var form = document.getElementById("edit-form");
      var saveBtn = document.getElementById("save-btn");
      var formatBtn = document.getElementById("format-btn");
      var saveStatus = document.getElementById("save-status");
      var scrapeBtn = document.getElementById("btn-scrape");
      var isSaving = false;
      var easyMDE = null;

      // Toast 辅助函数：优先复用全局 Toast，如果不存在则退化为 alert
      function showToast(message, type) {
        type = type || "info";
        if (window.showToast) {
          window.showToast(message, type);
        } else if (window.Toast && typeof window.Toast.show === "function") {
          window.Toast.show(message, type);
        } else {
          alert(message);
        }
      }

      // 初始化 EasyMDE（使用尽量轻量的配置，避免 2G 服务器输入卡顿）
      (function initEasyMDE() {
        var textarea = document.getElementById("content");
        if (!textarea || !window.EasyMDE) {
          return;
        }

        easyMDE = new EasyMDE({
          element: textarea,
          autofocus: true,
          spellChecker: false,
          autoDownloadFontAwesome: false, // 我们通过 CDN 手动引入，避免 EasyMDE 自动拉取
          status: false,
          renderingConfig: {
            singleLineBreaks: false
          },
          lineNumbers: true,
          // 注：折叠 gutter 依赖外部 CodeMirror 插件，某些环境会出现 CodeMirror not defined，
          // 为避免影响保存流程，这里先禁用 fold gutter。
          toolbar: [
            "bold",
            "italic",
            "heading-1",
            "heading-2",
            "heading-3",
            "|",
            "unordered-list",
            "ordered-list",
            "|",
            "quote",
            "code",
            "|",
            "link",
            "image",
            "|",
            "preview",
            "side-by-side",
            "fullscreen"
          ],
          lineWrapping: true
        });

        // 统一编辑区字体和标题样式
        try {
          var cm = easyMDE.codemirror;
          cm.getWrapperElement().classList.add("copyez-easymde");
          // 关键：允许编辑器随内容增长，禁止内部滚动条（页面只保留一个主滚动条）
          try {
            cm.setOption("viewportMargin", Infinity);
            cm.setSize(null, "auto");
            var resizePending = null;
            function scheduleAutoSize() {
              if (resizePending) return;
              resizePending = window.requestAnimationFrame(function () {
                resizePending = null;
                try { cm.setSize(null, "auto"); } catch (e) {}
              });
            }
            cm.on("changes", scheduleAutoSize);
            window.addEventListener("resize", scheduleAutoSize);
            scheduleAutoSize();
          } catch (e) {}

          // 智能粘贴（Word / 网页带格式内容 → Markdown）
          initSmartPaste(cm);

          // 粘贴 / 拖拽图片即上传
          initImagePasteAndDrop(cm);

          // 启用编辑页大纲导航：根据 # / ## 标题实时生成
          initEditorOutline(cm);
        } catch (e) {
          console.error("EasyMDE init style error", e);
        }
      })();

      // 编辑页大纲导航：监听内容变更，基于 # / ## 标题实时生成侧栏大纲
      function initEditorOutline(cm) {
        var outlineContainer = document.getElementById("editor-outline");
        if (!outlineContainer) {
          return;
        }

        function extractHeadings() {
          var doc = cm.getDoc();
          var lineCount = doc.lineCount();
          var headings = [];

          for (var i = 0; i < lineCount; i++) {
            var lineText = doc.getLine(i) || "";
            var match = /^(#{1,3})\s+(.+)$/.exec(lineText);
            if (!match) continue;

            var level = match[1].length;
            // 只取 # 和 ## 为主（最多到 ###）
            if (level < 1 || level > 3) continue;

            var text = match[2].trim();
            if (!text) continue;

            headings.push({
              line: i,
              level: level,
              text: text
            });
          }

          return headings;
        }

        function renderOutline() {
          var headings = extractHeadings();

          if (!headings.length) {
            outlineContainer.innerHTML =
              '<div class="editor-outline-empty">暂无大纲（使用 # 或 ## 添加章节标题）</div>';
            return;
          }

          var html = ['<ul class="editor-outline-list">'];
          headings.forEach(function (h, index) {
            var levelClass = "outline-level-" + h.level;
            var safeText = h.text
              .replace(/&/g, "&amp;")
              .replace(/</g, "&lt;")
              .replace(/>/g, "&gt;");

            html.push(
              '<li class="editor-outline-item ' + levelClass + '">' +
                '<button type="button" class="editor-outline-link" data-line="' + h.line + '">' +
                  safeText +
                "</button>" +
              "</li>"
            );
          });
          html.push("</ul>");

          outlineContainer.innerHTML = html.join("");

          // 绑定点击事件：滚动到对应标题行
          var links = outlineContainer.querySelectorAll(".editor-outline-link");
          for (var i = 0; i < links.length; i++) {
            (function (btn) {
              btn.addEventListener("click", function () {
                var line = parseInt(btn.getAttribute("data-line"), 10);
                if (isNaN(line)) return;
                cm.scrollIntoView({ line: line, ch: 0 }, 100);
                cm.setCursor({ line: line, ch: 0 });
                cm.focus();
              });
            })(links[i]);
          }
        }

        // 初始化与变更监听（轻微防抖）
        var renderPending = null;
        function scheduleRender() {
          if (renderPending) {
            clearTimeout(renderPending);
          }
          renderPending = setTimeout(function () {
            renderOutline();
            renderPending = null;
          }, 200);
        }

        cm.on("changes", scheduleRender);

        // 初次渲染一次
        scheduleRender();
      }

      // 图片上传工具：复用后端 /api/upload_image
      function uploadImageFile(file) {
        var formData = new FormData();
        formData.append("image", file);

        return fetch("{{ url_for('upload_image') }}", {
          method: "POST",
          body: formData
        }).then(function (resp) {
          if (!resp.ok) {
            throw new Error("上传失败：" + resp.status);
          }
          return resp.json();
        });
      }

      // 智能粘贴：拦截 HTML 粘贴，深度清洗 Word / 网页 HTML，再用 Turndown 转 Markdown，并做公文标题识别
      function initSmartPaste(cm) {
        // 允许在 Turndown 不可用时退化为“纯文本 + 公文标题识别”模式
        if (!cm) {
          return;
        }

        // 用 DOM 解析 + 物理删除节点/属性的方式深度净化 HTML（保留 style 以便识别字体）
        function sanitizeHtml(html) {
          if (!html) return "";
          var parser = new DOMParser();
          var doc = parser.parseFromString(html, "text/html");
          var body = doc.body || doc.documentElement;
          if (!body) return html;

          // 删除明显无用/危险节点：style / meta / link / script / noscript / title
          var uselessNodes = body.querySelectorAll(
            "style,meta,link,script,noscript,title"
          );
          for (var i = uselessNodes.length - 1; i >= 0; i--) {
            var n = uselessNodes[i];
            if (n && n.parentNode) {
              n.parentNode.removeChild(n);
            }
          }

          // 删除注释节点
          try {
            var walker = doc.createTreeWalker(
              body,
              NodeFilter.SHOW_COMMENT,
              null,
              false
            );
            var comment;
            var commentsToRemove = [];
            while ((comment = walker.nextNode())) {
              commentsToRemove.push(comment);
            }
            commentsToRemove.forEach(function (c) {
              if (c && c.parentNode) {
                c.parentNode.removeChild(c);
              }
            });
          } catch (e) {}

          // 暴力剥离大部分属性，只保留极少数“有用语义”的属性（比如 a[href]、img[src|alt]）
          // 注意：保留 style / class，后续用于识别字体（黑体/楷体 → 标题）
          function cleanAttributes(el) {
            if (!el || !el.getAttributeNames) return;
            var tag = el.tagName ? el.tagName.toLowerCase() : "";
            var keep = {};
            if (tag === "a") {
              keep.href = true;
              keep.title = true;
            } else if (tag === "img") {
              keep.src = true;
              keep.alt = true;
              keep.title = true;
            }

            var attrs = el.getAttributeNames();
            for (var i = 0; i < attrs.length; i++) {
              var name = attrs[i];
              var lower = name.toLowerCase();
              // 所有 data-*、on* 事件、lang 等一律去掉
              if (
                lower.indexOf("data-") === 0 ||
                lower === "lang" ||
                lower.indexOf("on") === 0
              ) {
                el.removeAttribute(name);
                continue;
              }
              if (!keep[lower]) {
                el.removeAttribute(name);
              }
            }
          }

          var all = body.getElementsByTagName("*");
          for (var j = 0; j < all.length; j++) {
            cleanAttributes(all[j]);
          }

          return body.innerHTML || "";
        }

        // 根据字体（黑体/楷体）检测标题层级：1 → #，2 → ##
        function detectHeadingLevelByFont(node) {
          if (!node) return 0;
          var styleText = "";
          try {
            if (node.getAttribute) {
              styleText += (node.getAttribute("style") || "") + " ";
            }
            if (node.style && node.style.fontFamily) {
              styleText += node.style.fontFamily + " ";
            }
            if (node.querySelectorAll) {
              var spans = node.querySelectorAll("span");
              for (var i = 0; i < spans.length; i++) {
                var s = spans[i];
                if (!s) continue;
                if (s.getAttribute) {
                  styleText += (s.getAttribute("style") || "") + " ";
                }
                if (s.style && s.style.fontFamily) {
                  styleText += s.style.fontFamily + " ";
                }
              }
            }
          } catch (e) {}

          if (!styleText) return 0;
          var lower = styleText.toLowerCase();
          // 黑体系列 → 一级标题（用 #）
          if (lower.indexOf("黑体") !== -1 || lower.indexOf("simhei") !== -1) {
            return 1;
          }
          // 楷体系列 → 二级标题（用 ##）
          if (
            lower.indexOf("楷体") !== -1 ||
            lower.indexOf("kaiti") !== -1 ||
            lower.indexOf("楷体_gb2312") !== -1
          ) {
            return 2;
          }
          return 0;
        }

        // 公文标题识别：一、 二、 第三章 / （一） / 1. 等
        function isTopHeading(text) {
          if (!text) return false;
          if (text.length > 40) return false;
          return (
            /^[一二三四五六七八九十]+、/.test(text) ||
            /^第[一二三四五六七八九十]+[章节部分篇]/.test(text)
          );
        }

        function isSecondHeading(text) {
          if (!text) return false;
          if (text.length > 40) return false;
          return (
            /^（[一二三四五六七八九十]）/.test(text) ||
            /^\([一二三四五六七八九十]\)/.test(text)
          );
        }

        function isThirdHeading(text) {
          if (!text) return false;
          if (text.length > 60) return false;
          // 1.  2. 或 1、2、 这类序号小标题
          return /^\d+[\.、]/.test(text);
        }

        // 轻量版行首空格清理与换行规范（浏览器端版 deep_clean_content）
        function normalizeTextLines(text) {
          if (!text) return text;
          // 统一换行
          text = text.replace(/\r\n/g, "\n").replace(/\r/g, "\n");
          // 去掉每一行开头的空格/制表符/全角空格
          text = text.replace(/^[ \t\u00A0\u3000]+/gm, "");
          // 合并多余空行
          text = text.replace(/\n{3,}/g, "\n\n");
          return text.trim();
        }

        function applySmartHeading(markdown) {
          if (!markdown) return markdown;
          var lines = markdown.split(/\r?\n/);

          function isHeadingLine(trimmed) {
            if (!trimmed) return false;
            if (/^#{1,6}\s+/.test(trimmed)) return true;
            return (
              isTopHeading(trimmed) ||
              isSecondHeading(trimmed) ||
              isThirdHeading(trimmed)
            );
          }

          var result = [];
          for (var i = 0; i < lines.length; i++) {
            var line = lines[i];
            var trimmed = line.trim();
            if (!trimmed) {
              result.push("");
              continue;
            }

            // 已经是 Markdown 标题的不再处理，只负责补空行
            if (/^#{1,6}\s+/.test(trimmed)) {
              // 保证前后有空行
              if (result.length && result[result.length - 1].trim() !== "") {
                result.push("");
              }
              result.push(trimmed);
              if (i + 1 < lines.length && (lines[i + 1] || "").trim() !== "") {
                result.push("");
              }
              continue;
            }

            if (isTopHeading(trimmed)) {
              if (result.length && result[result.length - 1].trim() !== "") {
                result.push("");
              }
              result.push("## " + trimmed);
              if (i + 1 < lines.length && (lines[i + 1] || "").trim() !== "") {
                result.push("");
              }
            } else if (isSecondHeading(trimmed)) {
              if (result.length && result[result.length - 1].trim() !== "") {
                result.push("");
              }
              result.push("### " + trimmed);
              if (i + 1 < lines.length && (lines[i + 1] || "").trim() !== "") {
                result.push("");
              }
            } else if (isThirdHeading(trimmed)) {
              if (result.length && result[result.length - 1].trim() !== "") {
                result.push("");
              }
              result.push("#### " + trimmed);
              if (i + 1 < lines.length && (lines[i + 1] || "").trim() !== "") {
                result.push("");
              }
            } else {
              result.push(line);
            }
          }
          return result.join("\n");
        }

        cm.on("paste", function (cmInstance, e) {
          var clipboardData =
            e.clipboardData || (e.originalEvent && e.originalEvent.clipboardData);
          if (!clipboardData) {
            return;
          }

          var html = clipboardData.getData("text/html");
          var plain = clipboardData.getData("text/plain") || "";

          // 如果既没有 HTML 也没有纯文本，就不处理
          if (!html && !plain) {
            return;
          }

          // 总是接管粘贴事件，以便做行首空格清理和公文标题识别
          e.preventDefault();

          try {
            var markdown = "";
            if (html && window.TurndownService) {
              // Turndown 可用：走“HTML → Markdown”完整链路
              var cleanHtml = sanitizeHtml(html);
              var turndownService = new TurndownService({
                headingStyle: "atx",
                bulletListMarker: "-"
              });

              // 识别基于字体的公文标题（黑体 / 楷体）
              turndownService.addRule("fontHeadingParagraph", {
                filter: function (node) {
                  if (!node || !node.nodeName) return false;
                  var name = node.nodeName.toUpperCase();
                  if (name !== "P" && name !== "DIV") return false;
                  return detectHeadingLevelByFont(node) > 0;
                },
                replacement: function (content, node) {
                  var level = detectHeadingLevelByFont(node);
                  if (!level) return content;
                  var text = (content || "").trim();
                  if (!text) return "";
                  // 去掉包在整段外面的 **...**，避免加粗和标题重复
                  text = text.replace(/^\*{2}([\s\S]*?)\*{2}$/g, "$1");
                  var prefix = "# ";
                  if (level === 2) {
                    prefix = "## ";
                  }
                  return "\n\n" + prefix + text + "\n\n";
                }
              });

              markdown = turndownService.turndown(cleanHtml);

              // 规范空白：将连续空格压缩为单空格
              markdown = markdown.replace(/ {2,}/g, " ");

              // 修正粗体内部与外部空格：
              // 1）删除 ** 和内容之间的空格：** 三是突出韧性。** → **三是突出韧性。**
              markdown = markdown.replace(
                /\*\*\s+([^\*\n]+?)\s+\*\*/g,
                "**$1**"
              );
              // 2）如果前后直接跟着中文/数字/字母，则在外侧补一个空格：**三是突出韧性。**内容 → **三是突出韧性。** 内容
              markdown = markdown
                .replace(
                  /(\*\*[^*]+?\*\*)(?=[\u4e00-\u9fff0-9A-Za-z])/g,
                  "$1 "
                )
                .replace(
                  /([\u4e00-\u9fff0-9A-Za-z])(\*\*[^*]+?\*\*)/g,
                  "$1 $2"
                );

              // 英文标点 → 中文标点（简单全局替换，足够覆盖大部分公文场景）
              markdown = markdown
                .replace(/,/g, "，")
                .replace(/;/g, "；")
                .replace(/:/g, "：")
                .replace(/\?/g, "？")
                .replace(/!/g, "！");
            } else {
              // Turndown 不可用：退化为对纯文本做“清行首空格 + 公文标题识别”
              markdown = plain;
            }

            markdown = normalizeTextLines(markdown);
            // 序号类标题兜底处理
            markdown = applySmartHeading(markdown);

            cmInstance.replaceSelection(markdown);
          } catch (err) {
            console.error("智能粘贴失败，回退为默认行为", err);
            // 回退时让浏览器自行处理（不再拦截）
            return;
          }
        });
      }

      function insertImageMarkdown(cm, url) {
        if (!cm || !url) return;
        var doc = cm.getDoc();
        var pos = doc.getCursor();
        var markdown = "![" + "图片描述" + "](" + url + ")";
        doc.replaceRange(markdown, pos);
      }

      function initImagePasteAndDrop(cm) {
        if (!cm || !window.FormData || !window.fetch) {
          return;
        }

        function handleImageFiles(files) {
          if (!files || !files.length) return;
          var imageFiles = [];
          for (var i = 0; i < files.length; i++) {
            var f = files[i];
            if (f && f.type && f.type.indexOf("image") === 0) {
              imageFiles.push(f);
            }
          }
          if (!imageFiles.length) return;

          imageFiles.forEach(function (file) {
            uploadImageFile(file)
              .then(function (data) {
                if (!data || !data.success || !data.url) {
                  return;
                }
                insertImageMarkdown(cm, data.url);
              })
              .catch(function (err) {
                console.error("图片上传失败", err);
              });
          });
        }

        cm.on("paste", function (cmInstance, e) {
          var clipboardData = e.clipboardData || (e.originalEvent && e.originalEvent.clipboardData);
          if (!clipboardData || !clipboardData.items) {
            return;
          }

          var items = clipboardData.items;
          var imageFiles = [];

          for (var i = 0; i < items.length; i++) {
            var item = items[i];
            if (item.kind === "file" && item.type && item.type.indexOf("image") === 0) {
              var file = item.getAsFile && item.getAsFile();
              if (file) {
                imageFiles.push(file);
              }
            }
          }

          if (!imageFiles.length) {
            return;
          }

          e.preventDefault();
          handleImageFiles(imageFiles);
        });

        cm.on("drop", function (cmInstance, e) {
          var dt = e.dataTransfer;
          if (!dt || !dt.files || !dt.files.length) {
            return;
          }
          var files = dt.files;
          var imageFiles = [];
          for (var i = 0; i < files.length; i++) {
            var f = files[i];
            if (f && f.type && f.type.indexOf("image") === 0) {
              imageFiles.push(f);
            }
          }
          if (!imageFiles.length) {
            return;
          }
          e.preventDefault();
          handleImageFiles(imageFiles);
        });
      }

      // 异步保存函数
      function saveNote() {
        if (isSaving) {
          return; // 防止重复提交
        }

        // 验证必填字段
        var title = document.getElementById("title").value.trim();

        // 同步 EasyMDE 内容到 textarea
        if (easyMDE) {
          easyMDE.codemirror.save();
        }

        var content = document.getElementById("content").value.trim();
        if (!title || !content) {
          alert("标题和内容不能为空");
          return;
        }

        isSaving = true;
        saveBtn.disabled = true;
        saveStatus.style.display = "inline";
        saveStatus.textContent = "正在写入数据库...";
        saveStatus.style.color = "#666";

        // 收集表单数据
        var formData = new FormData(form);

        // 发送异步请求
        fetch(form.action, {
          method: "POST",
          body: formData,
          headers: {
            "X-Requested-With": "XMLHttpRequest"
          }
        })
        .then(function(response) {
          if (!response.ok) {
            throw new Error("保存失败: " + response.status);
          }
          // 尝试解析JSON响应
          return response.json().then(function(data) {
            if (data.success) {
              saveStatus.textContent = "保存成功！";
              saveStatus.style.color = "#10b981";
              
              // 等待一小段时间确保数据库写入完成，然后强制刷新页面
              setTimeout(function() {
                // 使用时间戳参数，触发详情页的强制刷新逻辑
                // 详情页会检测到此参数后执行 window.location.reload() 强制刷新
                window.location.href = data.redirect_url + "?t=" + Date.now();
              }, 300);
            } else {
              throw new Error(data.message || "保存失败");
            }
          }).catch(function(jsonError) {
            // 如果不是JSON响应，可能是重定向，使用传统方式
            saveStatus.textContent = "保存成功！";
            saveStatus.style.color = "#10b981";
            setTimeout(function() {
              var noteId = {{ note.id }};
              // 使用时间戳参数，触发详情页的强制刷新逻辑
              window.location.href = "/note/" + noteId + "?t=" + Date.now();
            }, 300);
          });
        })
        .catch(function(error) {
          console.error("保存失败:", error);
          saveStatus.textContent = "保存失败，请重试";
          saveStatus.style.color = "#ef4444";
          saveBtn.disabled = false;
          isSaving = false;
        });
      }

      // 表单提交事件：阻止默认提交，使用异步保存
      form.addEventListener("submit", function(e) {
        e.preventDefault();
        saveNote();
      });

      // 仅整理格式，不保存数据库
      function formatContentOnly() {
        if (!easyMDE) {
          showToast("编辑器尚未初始化，暂时无法整理格式", "error");
          return;
        }

        // 将编辑器内容同步到 textarea，便于提交给后端
        try {
          var v = easyMDE.value();
          var textareaEl = document.getElementById("content");
          if (textareaEl) {
            textareaEl.value = v;
          }
        } catch (e) {}
        try {
          easyMDE.codemirror.save();
        } catch (e) {}

        var contentEl = document.getElementById("content");
        var raw = (contentEl && contentEl.value) ? contentEl.value : "";
        if (!raw.trim()) {
          showToast("内容为空，无需整理格式", "warning");
          return;
        }

        if (!window.fetch) {
          showToast("当前浏览器不支持在线整理格式，请直接保存使用后端整理", "error");
          return;
        }

        var originalText = formatBtn.textContent;
        formatBtn.disabled = true;
        formatBtn.textContent = "整理中...";

        fetch("{{ url_for('api_format_markdown') }}", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "X-Requested-With": "XMLHttpRequest"
          },
          body: JSON.stringify({ content: raw })
        })
          .then(function (resp) {
            return resp.json().then(function (data) {
              return { ok: resp.ok, data: data };
            });
          })
          .then(function (result) {
            var ok = result.ok;
            var data = result.data || {};

            if (!ok || !data.success) {
              var msg = data.message || "格式整理失败，请稍后重试";
              showToast(msg, "error");
              return;
            }

            var cleaned = data.content || "";
            try {
              easyMDE.value(cleaned);
              if (easyMDE.codemirror) {
                easyMDE.codemirror.refresh();
              }
            } catch (e) {
              console.error("写入整理后内容失败", e);
              showToast("整理完成，但写回编辑器失败，请重试", "error");
              return;
            }

            showToast("已整理格式，当前页面内容已更新（尚未保存到数据库）", "success");
          })
          .catch(function (err) {
            console.error("格式整理接口调用失败", err);
            showToast("格式整理失败，请稍后重试", "error");
          })
          .finally(function () {
            formatBtn.disabled = false;
            formatBtn.textContent = originalText;
          });
      }

      if (formatBtn) {
        formatBtn.addEventListener("click", function () {
          formatContentOnly();
        });
      }

      // 原文链接智能抓取
      function initScrapeButton() {
        if (!scrapeBtn) return;

        scrapeBtn.addEventListener("click", function () {
          var urlInput = document.getElementById("sourceUrl");
          var titleInput = document.getElementById("title");

          if (!urlInput) {
            showToast("未找到原文链接输入框", "error");
            return;
          }

          var url = (urlInput.value || "").trim();
          if (!url) {
            showToast("请先粘贴文章链接", "warning");
            urlInput.focus();
            return;
          }

          if (!window.fetch) {
            showToast("当前浏览器不支持自动提取，请手动复制内容", "error");
            return;
          }

          var originalText = scrapeBtn.textContent;
          var originalCursor = document.body.style.cursor;

          scrapeBtn.disabled = true;
          scrapeBtn.classList.add("btn-scrape-loading");
          scrapeBtn.textContent = "提取中...";
          document.body.style.cursor = "wait";

          fetch("{{ url_for('api_scrape') }}", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "X-Requested-With": "XMLHttpRequest"
            },
            body: JSON.stringify({ url: url })
          })
            .then(function (resp) {
              return resp.json().then(function (data) {
                return { ok: resp.ok, data: data };
              });
            })
            .then(function (result) {
              var ok = result.ok;
              var data = result.data || {};

              if (!ok || data.status !== "success") {
                var msg =
                  data.message ||
                  "抓取失败，请确认链接是否为公众号文章，或稍后重试";
                showToast(msg, "error");
                return;
              }

              if (titleInput && data.title) {
                titleInput.value = data.title;
              }

              if (easyMDE && data.content) {
                try {
                  easyMDE.value(data.content);
                  if (easyMDE.codemirror) {
                    easyMDE.codemirror.refresh();
                  }
                } catch (e) {
                  console.error("写入 EasyMDE 内容失败", e);
                }
              }

              showToast("已为你提取标题与正文，可按需微调", "success");
            })
            .catch(function (err) {
              console.error("抓取失败", err);
              showToast("抓取失败，请稍后重试", "error");
            })
            .finally(function () {
              scrapeBtn.disabled = false;
              scrapeBtn.classList.remove("btn-scrape-loading");
              scrapeBtn.textContent = originalText;
              document.body.style.cursor = originalCursor || "default";
            });
        });
      }

      // Ctrl + S / Cmd + S 触发保存
      window.addEventListener("keydown", function (e) {
        var isMac = navigator.platform.toUpperCase().indexOf("MAC") >= 0;
        var saveKey =
          (!isMac && e.ctrlKey && e.key === "s") ||
          (isMac && e.metaKey && e.key === "s");

        if (saveKey) {
          e.preventDefault();
          if (!isSaving) {
            saveNote();
          }
        }
      });

      // 初始化原文链接智能提取按钮
      initScrapeButton();

    })();
  </script>

      min-width: 0;
    }

      flex: 0 0 auto;
      padding: 0 12px;
      height: 36px;
      border-radius: 6px;
      border: none;

      color: #fff;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      display: inline-flex;
      align-items: center;

        box-shadow 0.18s ease, opacity 0.18s ease;
    }

    .btn-scrape:hover:not(:disabled) {

    .btn-scrape.btn-scrape-loading {

  </style>
