{% extends "decoration/base.html" %}

{% block title %}RenovaMate - {{ page_title }}{% endblock %}

{% block content %}
<div class="page-container">
  <div class="page-header">
    <h1 class="page-title">{{ page_title }}</h1>
    <p class="page-subtitle">页面开发中...</p>
  </div>

  <div class="card" style="margin-top: 24px;">
    <div class="card-body">
      <p>这是 {{ page_title }} 的占位页面。</p>
      <p>完整内容将在后续阶段迁移。</p>
      <div style="margin-top: 16px;">
        <button class="btn btn-primary" type="button" data-toast="{{ page_title }} 页面开发中">
          测试 Toast
        </button>
      </div>
    </div>
  </div>
</div>
{% endblock %}
